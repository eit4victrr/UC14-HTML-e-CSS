<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Informações básicas</h1>
    <label for="nome">Insira seu nome</label>
    <input type="text" name="nome" placeholder="Ex:Victor Bruno">
    <br>
    <label for="senha">Insira sua senha</label>
    <input type="password" name="senha" placeholder="Ex:AsJsdf@$#67">
    <br>
    <label for="email">Insira seu email</label>
    <input type="email" name="email">
    <br>
    <h1>Dados pessoais</h1>
    <label for="data">Qual a data?</label>
    <input type="date" name="data">
    <br>
    <label for="numero">Insira sua idade</label>
    <input type="number" name="numero" min="1" max="120">
    <br>
    <label for="cor">Qual sua cor favorita?</label>
    <input type="color" name="cor">
    <br>
    <h1>Preferências</h1>
    <label for="gênero">Qual seu gênero?</label>
    <input type="radio" name="gênero" value="masculino">Masculino
    <input type="radio" name="gênero" value="feminino">Feminino
    <br>
    <label for="interesses">Quais os seus interesses?</label>
    <input type="checkbox" name="interesses" value="esportes">Esportes
    <input type="checkbox" name="interesses" value="musica">Música
    <input type="checkbox" name="interesses" value="tecnologia">Tecnologia
    <input type="checkbox" name="interesses" value="arte">Arte
    <br>
    <label for="arquivo">Selecione uma foto sua</label>
    <input type="file" name="arquivo" >
    







</body>
</html>
